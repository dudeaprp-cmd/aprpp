name: Deploy to GitHub Pages
 
on:
  push:
    branches: [main]
 
permissions:
  contents: read
  pages: write
  id-token: write
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
 
      - name: Inject Mapbox Token
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          find public -name "*.html" -o -name "*.js" | xargs sed -i \
            "s|YOUR_MAPBOX_TOKEN_HERE|${MAPBOX_TOKEN}|g"
 
      - name: Setup Pages
        uses: actions/configure-pages@v4
